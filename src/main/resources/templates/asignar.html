
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${pageTitle} ?: 'Asignar Número de Oficio'">Asignar Número de Oficio</title>
  <link rel="stylesheet" th:href="@{/css/asignar.css}">
</head>
<body>
<div th:replace="layout :: layout(${pageTitle}, ${active})">

    <div th:fragment="content">

      <div class="section-header">
        <h3>Asignar Número de Oficio</h3>
      </div>

      <div class="card form-card">
        <form th:action="@{/asignar-numero}" th:object="${oficioSaveDto}" method="post" class="form-grid">

          <fieldset class="card-section">
            <legend>Datos generales del destinatario</legend>
            <div class="form-row">
              <div class="form-group">
                <label for="nombres">Nombres</label>
                <input id="nombres" th:field="*{nombres}" type="text" class="input" />
                <div class="error" th:if="${#fields.hasErrors('nombres')}" th:errors="*{nombres}"></div>
              </div>
              <div class="form-group">
                <label for="paterno">Apellido Paterno</label>
                <input id="paterno" th:field="*{paterno}" type="text" class="input" />
                <div class="error" th:if="${#fields.hasErrors('paterno')}" th:errors="*{paterno}"></div>
              </div>
              <div class="form-group">
                <label for="materno">Apellido Materno</label>
                <input id="materno" th:field="*{materno}" type="text" class="input" />
                <div class="error" th:if="${#fields.hasErrors('materno')}" th:errors="*{materno}"></div>
              </div>
            </div>
          </fieldset>

          <fieldset class="card-section">
            <legend>Datos del oficio</legend>

            <div class="form-row">
              <div class="form-group checkbox-group">
                <input id="esRespuesta" th:field="*{esRespuesta}" type="checkbox" />
                <label for="esRespuesta">En contestación?</label>
              </div>

              <div class="form-group">
                <label for="contesta">Contesta Oficio (N°)</label>
                <input id="contesta" th:field="*{contesta}" type="text" class="input" />
                <div class="error" th:if="${#fields.hasErrors('contesta')}" th:errors="*{contesta}"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group full-width">
                <label for="asunto">Asunto</label>
                <input id="asunto" th:field="*{asunto}" type="text" class="input" />
                <div class="error" th:if="${#fields.hasErrors('asunto')}" th:errors="*{asunto}"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group full-width">
                <label for="observacion">Observaciones</label>
                <textarea id="observacion" th:field="*{observacion}" rows="4" class="input"></textarea>
                <div class="error" th:if="${#fields.hasErrors('observacion')}" th:errors="*{observacion}"></div>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="funcionarioId">Funcionario</label>
                <select id="funcionarioId" th:field="*{funcionarioId}" class="input">
                  <option value="" th:if="${#lists.isEmpty(funcionarios)}">-- No hay funcionarios --</option>
                  <option th:each="f : ${funcionarios}" th:value="${f.id}" th:text="${f.nombre + ' — ' + f.puesto}">Funcionario</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('funcionarioId')}" th:errors="*{funcionarioId}"></div>
              </div>
            </div>

          </fieldset>

          <div class="form-actions">
            <button type="submit" class="btn primary">Asignar número</button>
            <a th:href="@{/}" class="btn secondary">Cancelar</a>
          </div>

        </form>
      </div>

    </div>


</div>
</body>
</html>
