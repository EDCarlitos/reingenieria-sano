<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, active)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Sano'">Sano</title>
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">

    <!-- Page-specific CSS -->
    <link th:if="${active == 'oficios'}"       rel="stylesheet" th:href="@{/css/index.css}">
    <link th:if="${active == 'asignar'}"       rel="stylesheet" th:href="@{/css/asignar.css}">
    <link th:if="${active == 'buscar'}"        rel="stylesheet" th:href="@{/css/buscar-oficio.css}">
    <link th:if="${active == 'funcionarios'}"  rel="stylesheet" th:href="@{/css/funcionarios.css}">
    <link th:if="${active == 'reportes'}"      rel="stylesheet" th:href="@{/css/reportes.css}">
    <link th:if="${active == 'usuarios'}"      rel="stylesheet" th:href="@{/css/usuarios.css}">
    <link th:if="${active == 'logs'}"          rel="stylesheet" th:href="@{/css/logs.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <div th:replace="fragments/sidebar :: sidebar(active=${active})"></div>

    <!-- MAIN -->
    <div class="main">

      <header class="topbar">
        <div class="topbar-left">
          <div class="page-title" th:text="${pageTitle} ?: 'Bienvenido'">Bienvenido</div>
          <div class="page-date">Hoy es <strong th:text="${fecha}">dd/MM/yyyy</strong></div>
        </div>
        <div class="topbar-right">
          <span class="system-tag">Sistema de Oficios</span>
        </div>
      </header>

      <main class="content">
        <!-- Aquí se inserta el contenido de la página que usa el layout -->
        <div th:insert="~{::content}"></div>
      </main>

    </div>

    <script th:src="@{/js/sidebar.js}"></script>
    <script th:if="${active == 'oficios'}" th:src="@{/js/index.js}"></script>

</body>
</html>
