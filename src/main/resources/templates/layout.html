<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(pageTitle, active, logoUrl)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Sano'">Sano</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

    <!-- SIDEBAR -->
    <div th:replace="fragments/sidebar :: sidebar(active=${active}, logoUrl=${logoUrl})"></div>

    <!-- MAIN -->
    <div class="main">

      <header class="topbar">
        <div class="topbar-left">
          <div class="page-title" th:text="${pageTitle} ?: 'Bienvenido'">Bienvenido</div>
          <div class="page-date">Hoy es <strong th:text="${fecha}">dd/MM/yyyy</strong></div>
        </div>
        <div class="topbar-right">
          <span class="system-tag">Sistema de Oficios</span>
        </div>
      </header>

      <main class="content">
        <!-- Aquí se inserta el contenido de la página que usa el layout -->
        <div th:insert="~{::content}"></div>
      </main>

    </div>

    <script th:src="@{/js/sidebar.js}"></script>

</body>
</html>
