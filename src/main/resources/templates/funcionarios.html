<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Funcionarios'">Funcionarios</title>
    <link rel="stylesheet" th:href="@{/css/funcionarios.css}">
</head>
<body>
<div th:replace="layout :: layout(${pageTitle}, ${active})">

    <div th:fragment="content">

        <!-- PAGE HERO -->
        <div class="fn-hero">
            <div class="fn-hero-left">
                <div class="fn-hero-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </div>
                <div>
                    <h2>Gestión de Funcionarios</h2>
                    <p>Administra los funcionarios que atienden oficios</p>
                </div>
            </div>
            <button class="fn-btn-add" id="btnAdd" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                Nuevo Funcionario
            </button>
        </div>

        <!-- STATS BAR -->
        <div class="fn-stats" id="fnStats">
            <div class="fn-stat">
                <span class="fn-stat-value" id="statTotal">—</span>
                <span class="fn-stat-label">Total</span>
            </div>
            <div class="fn-stat">
                <span class="fn-stat-value fn-stat-value--ok" id="statActivos">—</span>
                <span class="fn-stat-label">Activos</span>
            </div>
            <div class="fn-stat">
                <span class="fn-stat-value fn-stat-value--off" id="statInactivos">—</span>
                <span class="fn-stat-label">Inactivos</span>
            </div>
        </div>

        <!-- TABLE -->
        <div class="fn-panel">
            <div class="fn-panel-header">
                <h3>Funcionarios registrados</h3>
                <span class="fn-panel-count" id="fnCount">0 registros</span>
            </div>

            <div class="fn-table-wrap" id="fnTableWrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Puesto</th>
                            <th>Estado</th>
                            <th class="th-actions">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="fnTbody"></tbody>
                </table>
            </div>

            <!-- Empty -->
            <div class="fn-empty" id="fnEmpty" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <p class="fn-empty-title">Sin funcionarios</p>
                <p class="fn-empty-sub">Haz clic en "Nuevo Funcionario" para crear uno</p>
            </div>

            <!-- Loading -->
            <div class="fn-loading" id="fnLoading">
                <div class="spinner"></div>
                <span>Cargando funcionarios…</span>
            </div>
        </div>

        <!-- MODAL — CREATE / EDIT -->
        <div class="fn-modal-overlay" id="modalOverlay">
            <div class="fn-modal">
                <div class="fn-modal-header">
                    <h3 id="modalTitle">Nuevo Funcionario</h3>
                    <button type="button" class="fn-modal-close" id="modalClose" aria-label="Cerrar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <form id="fnForm" autocomplete="off">
                    <input type="hidden" id="fId" value="">
                    <div class="fn-form-group">
                        <label for="fNombre">Nombre completo</label>
                        <input id="fNombre" type="text" placeholder="Ej. Lic. Juan Pérez López" required maxlength="100">
                    </div>
                    <div class="fn-form-group">
                        <label for="fPuesto">Puesto / Cargo</label>
                        <input id="fPuesto" type="text" placeholder="Ej. Director General" required maxlength="100">
                    </div>
                    <div class="fn-form-error" id="formError" style="display:none"></div>
                    <div class="fn-form-actions">
                        <button type="button" class="fn-btn-cancel" id="btnCancel">Cancelar</button>
                        <button type="submit" class="fn-btn-save" id="btnSave">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- TOAST -->
        <div class="fn-toast" id="toast"></div>

        <script th:src="@{/js/funcionarios.js}"></script>
    </div>

</div>
</body>
</html>
