  <div th:fragment="sidebar(active)">
    <button id="sidebarToggle" class="mobile-menu-button" aria-label="Abrir menú" aria-expanded="false">☰</button>
    <div id="sidebarOverlay" class="sidebar-overlay" tabindex="-1"></div>
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="/" class="logo-area">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR6v4hPPDO9V4BR5Ck-aDigPDL2WqFRpkUIWA&amp;s" alt="Logo empresa">
        </a>
        <div class="company-name">Sano</div>
        <div class="company-sub">Sistema de Oficios</div>
        <button id="sidebarClose" class="sidebar-close" aria-label="Cerrar menú">✕</button>
      </div>

      <!-- User info -->
      <div class="sidebar-user" th:if="${currentUsername != null}">
        <div class="sidebar-user-avatar" th:text="${#strings.toUpperCase(#strings.substring(currentUsername, 0, 1))}">U</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" th:text="${currentUsername}">usuario</div>
          <span class="sidebar-user-role" th:text="${currentRole}" th:classappend="${currentRole == 'ADMIN'} ? ' sidebar-user-role--admin' : ''">ROL</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <span class="nav-label">Acciones</span>
        <a th:href="@{/}" th:classappend="${active == 'oficios'} ? ' active' : ''">Oficios</a>
        <a th:href="@{/asignar-numero}" th:classappend="${active == 'asignar'} ? ' active' : ''">Asignar Número</a>
        <a th:href="@{/generar-reportes}" th:classappend="${active == 'reportes'} ? ' active' : ''">Generar Reportes</a>
      </nav>

      <nav class="sidebar-nav sidebar-nav--sistema">
        <span class="nav-label">Sistema</span>
        <a th:if="${isAdmin}" th:href="@{/funcionarios}" th:classappend="${active == 'funcionarios'} ? ' active' : ''">Gestión de Funcionarios</a>
        <a th:if="${isAdmin}" th:href="@{/usuarios}" th:classappend="${active == 'usuarios'} ? ' active' : ''">Gestión de Usuarios</a>
        <a th:if="${isAdmin}" th:href="@{/logs}" th:classappend="${active == 'logs'} ? ' active' : ''">Logs</a>
        <a th:href="@{/sistema-info}" th:classappend="${active == 'sistema'} ? ' active' : ''">Información del Sistema</a>
      </nav>

      <div class="sidebar-footer">
          <nav class="sidebar-nav">
            <form th:action="@{/logout}" method="post" style="margin:0;padding:0;">
              <button type="submit" class="sidebar-logout-btn" th:classappend="${active == 'salir'} ? ' danger active' : ' danger'">Salir / Cerrar Sesión</button>
            </form>
          </nav>
      </div>
    </aside>
  </div>
