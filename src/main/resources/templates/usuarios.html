<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Usuarios'">Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
</head>
<body>
<div th:replace="layout :: layout(${pageTitle}, ${active})">

    <div th:fragment="content">

        <!-- ═══════════════════════════════════════════
             PAGE HERO
        ═══════════════════════════════════════════ -->
        <div class="usr-hero">
            <div class="usr-hero-left">
                <div class="usr-hero-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div>
                    <h2>Gestión de Usuarios</h2>
                    <p>Administra las cuentas de acceso al sistema</p>
                </div>
            </div>
            <button class="usr-btn-add" id="btnAdd" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
                Nuevo Usuario
            </button>
        </div>

        <!-- ═══════════════════════════════════════════
             STATS BAR
        ═══════════════════════════════════════════ -->
        <div class="usr-stats" id="usrStats">
            <div class="usr-stat">
                <span class="usr-stat-value" id="statTotal">—</span>
                <span class="usr-stat-label">Total</span>
            </div>
            <div class="usr-stat">
                <span class="usr-stat-value usr-stat-value--ok" id="statActivos">—</span>
                <span class="usr-stat-label">Activos</span>
            </div>
            <div class="usr-stat">
                <span class="usr-stat-value usr-stat-value--off" id="statInactivos">—</span>
                <span class="usr-stat-label">Inactivos</span>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════
             USERS TABLE
        ═══════════════════════════════════════════ -->
        <div class="usr-panel">
            <div class="usr-panel-header">
                <h3>Usuarios registrados</h3>
                <span class="usr-panel-count" id="usrCount">0 registros</span>
            </div>

            <div class="usr-table-wrap" id="usrTableWrap">
                <table>
                    <thead>
                        <tr>
                            <th>Usuario</th>
                            <th>Rol</th>
                            <th>Estado</th>
                            <th class="th-actions">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usrTbody"></tbody>
                </table>
            </div>

            <!-- Empty -->
            <div class="usr-empty" id="usrEmpty" style="display:none">
                <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p class="usr-empty-title">Sin usuarios</p>
                <p class="usr-empty-sub">Haz clic en "Nuevo Usuario" para crear uno</p>
            </div>

            <!-- Loading -->
            <div class="usr-loading" id="usrLoading">
                <div class="spinner"></div>
                <span>Cargando usuarios…</span>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════
             MODAL — CREATE / EDIT
        ═══════════════════════════════════════════ -->
        <div class="usr-modal-overlay" id="modalOverlay">
            <div class="usr-modal">
                <div class="usr-modal-header">
                    <h3 id="modalTitle">Nuevo Usuario</h3>
                    <button type="button" class="usr-modal-close" id="modalClose" aria-label="Cerrar">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <form id="usrForm" autocomplete="off">
                    <input type="hidden" id="fId" value="">
                    <div class="usr-form-group">
                        <label for="fUsername">Nombre de usuario</label>
                        <input id="fUsername" type="text" placeholder="Ej. juan.perez" required maxlength="50">
                    </div>
                    <div class="usr-form-group">
                        <label for="fPassword">Contraseña <span id="pwdHint" style="display:none">(dejar vacío para no cambiar)</span></label>
                        <input id="fPassword" type="password" placeholder="Mínimo 4 caracteres" maxlength="100">
                    </div>
                    <div class="usr-form-group">
                        <label for="fRol">Rol</label>
                        <select id="fRol">
                            <option value="EMPLEADO">Empleado</option>
                            <option value="ADMIN">Administrador</option>
                        </select>
                    </div>
                    <div class="usr-form-error" id="formError" style="display:none"></div>
                    <div class="usr-form-actions">
                        <button type="button" class="usr-btn-cancel" id="btnCancel">Cancelar</button>
                        <button type="submit" class="usr-btn-save" id="btnSave">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════
             TOAST
        ═══════════════════════════════════════════ -->
        <div class="usr-toast" id="toast"></div>

        <script th:inline="javascript">
            window.CURRENT_USERNAME = /*[[${currentUsername}]]*/ '';
        </script>
        <script th:src="@{/js/usuarios.js}"></script>
    </div>

</div>
</body>
</html>
